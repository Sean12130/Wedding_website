<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Begins</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero">
  <nav>
    <div class="logo">Forever Begins</div>
    <div class="links">
      <a href="#story">Our Story</a>
      <a href="#details">Details</a>
      <a href="#gallery">Gallery</a>
      <a href="#rsvp">RSVP</a>
    </div>
  </nav>
  <div class="hero-content">
    <h1>Emma & James</h1>
    <p>We’re getting married</p>
    <h2>October 10, 2026</h2>
  </div>
</header>

<section id="story" class="section">
<h2>Our Story</h2>
<p>Add your story here.</p>
</section>

<section id="details" class="section">
<h2>Wedding Details</h2>
<p>Venue Name<br>City, State</p>
</section>

<section id="gallery" class="section">
<h2>Gallery</h2>
<div class="gallery">
<div class="placeholder">Photo</div>
<div class="placeholder">Photo</div>
<div class="placeholder">Photo</div>
</div>
</section>

<section id="rsvp" class="section">
<h2>RSVP</h2>
<form action="https://formsubmit.co/your@email.com" method="POST">
<input type="text" name="name" placeholder="Full Name" required>
<select name="attendance" required>
<option value="">Will you attend?</option>
<option>Joyfully Accept</option>
<option>Respectfully Decline</option>
</select>
<input type="number" name="guests" placeholder="Number of Guests">
<textarea name="message" placeholder="Message"></textarea>
<button type="submit">Send RSVP</button>
</form>
</section>

<footer>
<p>Made with love • Replace placeholders with your details</p>
</footer>
</body>
</html>
